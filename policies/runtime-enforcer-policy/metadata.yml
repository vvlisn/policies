rules:
  - apiGroups:
      - ""
    apiVersions:
      - v1
    resources:
      - pods
    operations:
      - CREATE
      - UPDATE
  - apiGroups:
      - apps
    apiVersions:
      - v1
    resources:
      - deployments
      - replicasets
      - statefulsets
      - daemonsets
    operations:
      - CREATE
      - UPDATE
  - apiGroups:
      - batch
    apiVersions:
      - v1
    resources:
      - jobs
      - cronjobs
    operations:
      - CREATE
      - UPDATE
mutating: false
contextAwareResources:
  - apiVersion: security.rancher.io/v1alpha1
    kind: WorkloadPolicy
hostCapabilities:
  - kubernetes/get_resource
executionMode: kubewarden-wapc
# Consider the policy for the background audit scans. Default is true. Note the
# intrinsic limitations of the background audit feature on docs.kubewarden.io;
# If your policy hits any limitations, set to false for the audit feature to
# skip this policy and not generate false positives.
backgroundAudit: true
annotations:
  # artifacthub specific:
  io.artifacthub.displayName: WorkloadPolicy config verifier
  io.artifacthub.resources: Pod, Deployments, Replicaset, Statefulset, Daemonset, Job, Cronjob
  io.artifacthub.keywords: deployment, replicaset, statefulset, daemonset, job, cronjob, pod, runtime-enforcer
  io.kubewarden.policy.ociUrl: ghcr.io/kubewarden/policies/runtime-enforcer # must match release workflow oci-target
  # kubewarden specific:
  io.kubewarden.policy.title: runtime-enforcer
  io.kubewarden.policy.version: 0.1.0
  io.kubewarden.policy.description: Policy that enforces runtime-enforcer policies to be present when a workload is created
  io.kubewarden.policy.author: "Kubewarden developers <cncf-kubewarden-maintainers@lists.cncf.io>"
  io.kubewarden.policy.url: https://github.com/kubewarden/policies
  io.kubewarden.policy.source: https://github.com/kubewarden/policies
  io.kubewarden.policy.license: Apache-2.0
  # The next two annotations are used in the policy report generated by the
  # Audit scanner. Severity indicates policy check result criticality and
  # Category indicates policy category. See more here at docs.kubewarden.io
  io.kubewarden.policy.severity: medium # one of info, low, medium, high, critical. See docs.
  io.kubewarden.policy.category: Runtime Enforcer
